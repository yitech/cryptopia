services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cryptopia
      POSTGRES_PASSWORD: cryptopia
      POSTGRES_DB: cryptopia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptopia"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://cryptopia:cryptopia@db:5432/cryptopia
      SECRET_KEY: ${SECRET_KEY:-please-change-this-in-production}
      ALLOWED_ORIGINS: '["http://localhost:5173", "http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Internal URL for SSR fetches (resolves over the Docker network).
      API_URL: http://backend:8000
      # Public URL — runtime calls go through the SvelteKit /api proxy, but
      # widgets that still surface `apiBase` use this as a fallback.
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
      ORIGIN: ${ORIGIN:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
